<nav class="bottom-nav">
  <button
    type="button"
    [class.active]="isActive('/dashboard')"
    (click)="navigate('/dashboard')">
    <ion-icon name="home-outline"></ion-icon>
    <span>Inicio</span>
  </button>

  @if(canPrescriptions){
    <button
      type="button"
      [class.active]="isActive('/prescriptions')"
      (click)="navigate('/prescriptions')">
      <ion-icon name="document-text-outline"></ion-icon>
      <span>Recetas</span>
    </button>
  }

  @if(canProductions){
    <button
      type="button"
      [class.active]="isActive('/productions')"
      (click)="navigate('/productions')">
      <ion-icon name="flask-outline"></ion-icon>
      <span>Producción</span>
    </button>
  }

  @if(canDeliveries){
    <button
      type="button"
      [class.active]="isActive('/delivery')"
      (click)="navigate('/delivery')">
      <ion-icon name="car-outline"></ion-icon>
      <span>Entregas</span>
    </button>
  }

  <button
    type="button"
    [class.active]="isActive('/profile')"
    (click)="navigate('/profile')">
    <ion-icon name="person-outline"></ion-icon>
    <span>Perfil</span>
  </button>
</nav>
