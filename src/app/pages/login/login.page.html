<ion-content class="ion-padding">

  <div class="login-container">

    <h1>QF Gestión</h1>

    <p>Sistema de Gestión Farmacéutica</p>

    <ion-item>
      <ion-input
        label="Usuario"
        labelPlacement="floating">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        type="password"
        label="Contraseña"
        labelPlacement="floating">
      </ion-input>
    </ion-item>

    <ion-button
      expand="block"
      (click)="login()">

      Ingresar

    </ion-button>

  </div>

</ion-content>
