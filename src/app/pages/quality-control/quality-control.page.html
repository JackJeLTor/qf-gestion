<ion-header>

  <ion-toolbar>

    <ion-title>

      Control de Calidad

    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  @for(
    production of productions;
    track production.id
  ){

    <ion-card>

      <ion-card-content>

        <h2>

          {{ production.patientName }}

        </h2>

        <p>

          Responsable:
          {{ production.responsible }}

        </p>

        <p>

          Fórmula:
          {{ production.formula }}

        </p>

        <ion-item>

          <ion-input
            label="Observaciones"
            labelPlacement="floating"
            [(ngModel)]="production.observations">
          </ion-input>

        </ion-item>

        <ion-button
          color="success"
          expand="block"
          (click)="approve(production)">

          Aprobar Lote

        </ion-button>

        <ion-button
          color="danger"
          expand="block"
          (click)="reject(production)">

          Rechazar Lote

        </ion-button>

      </ion-card-content>

    </ion-card>

  }

</ion-content>
