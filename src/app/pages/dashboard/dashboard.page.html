<ion-content>

  <div class="header">

    <h1>QF Gestión App</h1>

    <p>Sistema Farmacéutico</p>

  </div>

  <ion-grid>

    <ion-row>

      <ion-col size="6">
        <ion-card class="stat-card">

          <ion-card-content>

            <h2>{{ totalProducts }}</h2>

            <p>Productos</p>

          </ion-card-content>

        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card class="stat-card">

          <ion-card-content>

            <h2>{{ totalOrders }}</h2>

            <p>Pedidos</p>

          </ion-card-content>

        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card class="stat-card">

          <ion-card-content>

            <h2>{{ lowStock }}</h2>

            <p>Alertas</p>

          </ion-card-content>

        </ion-card>
      </ion-col>

      <ion-col size="6">
  <ion-card class="stat-card">
    <ion-card-content>
      <h2>{{ totalProducts + totalOrders }}</h2>
      <p>Movimientos</p>
    </ion-card-content>
  </ion-card>
</ion-col>

    </ion-row>

  </ion-grid>

  <div class="menu">

    <ion-button expand="block" (click)="goInventory()">
      📦 Inventario
    </ion-button>

    <ion-button expand="block" (click)="goProducts()">
      💊 Productos
    </ion-button>

    <ion-button expand="block" (click)="goOrders()">
      🛒 Pedidos
    </ion-button>

    <ion-button expand="block" (click)="goReports()">
      📊 Reportes
    </ion-button>

  </div>

</ion-content>
