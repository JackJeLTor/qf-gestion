<ion-header>
  <ion-toolbar>
    <ion-title>
      Reportes
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-content>
      <h2>Total Productos</h2>
      <h1>{{ totalProducts }}</h1>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-content>
      <h2>Total Pedidos</h2>
      <h1>{{ totalOrders }}</h1>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-content>
      <h2>Stock Bajo</h2>
      <h1>{{ lowStock }}</h1>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-content>
      <h2>Valor Inventario</h2>
      <h1>S/. {{ inventoryValue }}</h1>
    </ion-card-content>
  </ion-card>

</ion-content>
