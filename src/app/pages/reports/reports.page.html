<ion-header>
  <ion-toolbar>
    <ion-title>
      Reportes Ejecutivos
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card class="report-card products">

    <ion-card-content>

      <h2>📦 Productos Registrados</h2>

      <h1>{{ totalProducts }}</h1>

    </ion-card-content>

  </ion-card>

  <ion-card class="report-card orders">

    <ion-card-content>

      <h2>🛒 Pedidos Registrados</h2>

      <h1>{{ totalOrders }}</h1>

    </ion-card-content>

  </ion-card>

  <ion-card class="report-card sales">

    <ion-card-content>

      <h2>💰 Ventas Totales</h2>

      <h1>S/. {{ totalSales.toFixed(2) }}</h1>

    </ion-card-content>

  </ion-card>

  <ion-card class="report-card warning">

    <ion-card-content>

      <h2>⚠ Stock Bajo</h2>

      <h1>{{ lowStockProducts }}</h1>

    </ion-card-content>

  </ion-card>

  <ion-card class="report-card expire">

    <ion-card-content>

      <h2>📅 Próximos a Vencer</h2>

      <h1>{{ expiringProducts }}</h1>

    </ion-card-content>

  </ion-card>

</ion-content>
