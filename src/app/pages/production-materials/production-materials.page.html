<ion-header>

  <ion-toolbar>

    <ion-title>

      Materias Primas por Producción

    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <ion-item>

    <ion-select
      label="Producción"
      labelPlacement="floating"
      [(ngModel)]="productionId">

      @for(
        production of productions;
        track production.id
      ){

        <ion-select-option
          [value]="production.id">

          {{ production.patientName }}

        </ion-select-option>

      }

    </ion-select>

  </ion-item>

  <ion-item>

    <ion-select
      label="Materia Prima"
      labelPlacement="floating"
      [(ngModel)]="rawMaterialId">

      @for(
        material of rawMaterials;
        track material.id
      ){

        <ion-select-option
          [value]="material.id">

          {{ material.name }}

        </ion-select-option>

      }

    </ion-select>

  </ion-item>

  <ion-button
    expand="block"
    (click)="assignMaterial()">

    Asignar Materia Prima

  </ion-button>

</ion-content>
