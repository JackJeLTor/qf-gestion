<ion-header>

  <ion-toolbar>

    <ion-title>

      Consumo de Materias Primas

    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <ion-item>

    <ion-select
      label="Producción"
      labelPlacement="floating"
      [(ngModel)]="productionId">

      @for(
        production of productions;
        track production.id
      ){

        <ion-select-option
          [value]="production.id">

          {{ production.patientName }}

          -

          {{ production.batchNumber }}

        </ion-select-option>

      }

    </ion-select>

  </ion-item>

  <ion-item>

    <ion-select
      label="Materia Prima"
      labelPlacement="floating"
      [(ngModel)]="rawMaterialId">

      @for(
        material of rawMaterials;
        track material.id
      ){

        <ion-select-option
          [value]="material.id">

          {{ material.name }}

          ({{ material.stock }}
          {{ material.unit }})

        </ion-select-option>

      }

    </ion-select>

  </ion-item>

  <ion-item>

    <ion-input
      type="number"
      label="Cantidad Consumida"
      labelPlacement="floating"
      [(ngModel)]="quantity">
    </ion-input>

  </ion-item>

  <ion-item>

    <ion-input
      label="Responsable"
      labelPlacement="floating"
      [(ngModel)]="consumedBy">
    </ion-input>

  </ion-item>

  <ion-button
    expand="block"
    (click)="assignMaterial()">

    Registrar Consumo

  </ion-button>

</ion-content>
